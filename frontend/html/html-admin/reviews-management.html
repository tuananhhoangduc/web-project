<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý Đánh Giá - Barber Shop Admin</title>
    <link rel="stylesheet" href="../../css/css-admin/style.css" />
    <link rel="stylesheet" href="../../css/css-admin/admin-dashboard-styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-container">
        <div class="logo">
          <img src="../../image/logo.png" alt="Barber Shop Logo" />
        </div>
        <nav class="desktop-nav">
          <ul>
            <li><a href="admin-dashboard.html">Trang chủ</a></li>
            <li><a href="statistics.html">Thống kê</a></li>
            <li><a href="customer-management.html">Khách hàng</a></li>
            <li><a href="salon-appointments.html">Lịch hẹn</a></li>
            <li><a href="branch-management.html">Chi nhánh</a></li>
            <li><a href="service-management.html">Dịch vụ</a></li>
            <li><a href="stylist-management.html">Stylist</a></li>
            <li><a href="reviews-management.html">Đánh Giá</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="page-main">
      <div class="container">
        <h1>Quản lý Đánh Giá Khách Hàng</h1>

        <div style="margin-bottom: 30px;">
          <label>Lọc theo Thợ Cắt:</label>
          <select id="filter-stylist" style="padding: 8px; border-radius: 4px; border: 1px solid #ddd;">
            <option value="">-- Tất cả --</option>
          </select>
        </div>

        <div style="overflow-x: auto;">
          <table style="width: 100%; border-collapse: collapse;">
            <thead>
              <tr style="background: #f5f5f5;">
                <th style="padding: 12px; text-align: left; border: 1px solid #ddd;">Khách Hàng</th>
                <th style="padding: 12px; text-align: left; border: 1px solid #ddd;">Thợ Cắt</th>
                <th style="padding: 12px; text-align: center; border: 1px solid #ddd;">Rating</th>
                <th style="padding: 12px; text-align: left; border: 1px solid #ddd;">Bình Luận</th>
                <th style="padding: 12px; text-align: left; border: 1px solid #ddd;">Ngày</th>
                <th style="padding: 12px; text-align: center; border: 1px solid #ddd;">Hành Động</th>
              </tr>
            </thead>
            <tbody id="reviews-table-body">
              <tr>
                <td colspan="6" style="text-align: center; padding: 20px;">Đang tải...</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div id="pagination-container" style="text-align: center; margin-top: 20px;"></div>
      </div>
    </main>

    <script src="../../js/js-admin/admin-auth.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        loadStylists();
        loadReviews(1);

        document.getElementById('filter-stylist').addEventListener('change', () => {
          loadReviews(1);
        });
      });

      function loadStylists() {
        fetch('../../../backend/api/get_stylists_admin.php?page=1&limit=100')
          .then(res => res.json())
          .then(res => {
            const select = document.getElementById('filter-stylist');
            if (res.status === 'success') {
              res.data.forEach(st => {
                const option = document.createElement('option');
                option.value = st.stylist_id;
                option.innerText = st.full_name;
                select.appendChild(option);
              });
            }
          });
      }

      function loadReviews(page = 1) {
        const stylistId = document.getElementById('filter-stylist').value;
        const url = stylistId 
          ? `../../../backend/api/reviews.php?action=get_by_stylist&stylist_id=${stylistId}&page=${page}`
          : `../../../backend/api/reviews.php?action=get_all&page=${page}`;

        fetch(url)
          .then(res => res.json())
          .then(res => {
            const tbody = document.getElementById('reviews-table-body');
            tbody.innerHTML = '';

            if (res.status === 'success' && res.data.length > 0) {
              res.data.forEach(review => {
                const stars = '⭐'.repeat(review.rating) + '☆'.repeat(5 - review.rating);
                const date = new Date(review.created_at).toLocaleDateString('vi-VN');

                tbody.innerHTML += `
                  <tr>
                    <td style="padding: 12px; border: 1px solid #ddd;">${review.customer_name}</td>
                    <td style="padding: 12px; border: 1px solid #ddd;">${review.stylist_name || 'N/A'}</td>
                    <td style="padding: 12px; border: 1px solid #ddd; text-align: center;">${stars}</td>
                    <td style="padding: 12px; border: 1px solid #ddd; font-size: 14px;">${review.comment || '(Không có)'}</td>
                    <td style="padding: 12px; border: 1px solid #ddd;">${date}</td>
                    <td style="padding: 12px; border: 1px solid #ddd; text-align: center;">
                      <button onclick="deleteReview(${review.review_id})" style="
                        background: #e74c3c;
                        color: white;
                        border: none;
                        padding: 6px 12px;
                        border-radius: 4px;
                        cursor: pointer;
                      ">
                        <i class="fas fa-trash"></i> Xóa
                      </button>
                    </td>
                  </tr>
                `;
              });

              // Phân trang
              if (res.total_pages > 1) {
                const container = document.getElementById('pagination-container');
                container.innerHTML = '';
                for (let i = 1; i <= res.total_pages; i++) {
                  const btn = document.createElement('button');
                  btn.innerText = i;
                  btn.style.cssText = `margin: 0 5px; padding: 6px 12px; cursor: pointer; ${i === page ? 'background: #28a745; color: white;' : 'background: white; border: 1px solid #28a745; color: #28a745;'}`;
                  btn.onclick = () => loadReviews(i);
                  container.appendChild(btn);
                }
              }
            } else {
              tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 20px;">Không có đánh giá nào</td></tr>';
            }
          });
      }

      function deleteReview(reviewId) {
        if (confirm('Bạn có chắc chắn muốn xóa đánh giá này?')) {
          fetch(`../../../backend/api/reviews.php?action=delete&review_id=${reviewId}&user_id=0`)
            .then(res => res.json())
            .then(res => {
              alert(res.message);
              loadReviews(1);
            });
        }
      }
    </script>
  </body>
</html>
