<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý Dịch vụ - Barber Shop Admin</title>
    <link rel="stylesheet" href="../../css/css-admin/style.css" />
    <link
      rel="stylesheet"
      href="../../css/css-admin/service-management-styles.css"
    />
    <link
      rel="stylesheet"
      href="../../css/css-admin/admin-dashboard-styles.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-container">
        <div class="logo">
          <img src="../../image/logo.png" alt="Barber Shop Logo" />
        </div>
        <div class="hamburger-icon"><i class="fas fa-bars"></i></div>
        <nav class="desktop-nav">
          <ul>
            <li><a href="admin-dashboard.html">Trang chủ</a></li>
            <li><a href="customer-management.html">Khách hàng</a></li>
            <li><a href="salon-appointments.html">Lịch hẹn</a></li>
            <li><a href="branch-management.html">Chi nhánh</a></li>
            <li><a href="service-management.html">Dịch vụ</a></li>
            <li><a href="stylist-management.html">Stylist</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="page-main">
      <div class="container">
        <h1>Quản lý Dịch vụ</h1>
        <div class="service-management-container">
          <div class="add-service-block">
            <h2 id="form-title">Thêm Dịch vụ Mới</h2>
            <button class="btn primary-btn" id="show-add-service-form-btn">
              <i class="fas fa-plus"></i> Thêm Dịch vụ
            </button>

            <div
              id="add-service-form-container"
              class="add-service-form-container"
            >
              <form id="add-service-form">
                <input
                  type="hidden"
                  id="service-id"
                  name="service_id"
                  value=""
                />
                <div class="form-group">
                  <label for="service-name">Tên dịch vụ:</label>
                  <input
                    type="text"
                    id="service-name"
                    name="service_name"
                    placeholder="Nhập tên dịch vụ"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="service-price">Giá (VNĐ):</label>
                  <input
                    type="number"
                    id="service-price"
                    name="service_price"
                    placeholder="Nhập giá (VNĐ)"
                    required
                    min="0"
                  />
                </div>
                <div class="form-group">
                  <label for="service-duration">Thời lượng (phút):</label>
                  <input
                    type="number"
                    id="service-duration"
                    name="service_duration"
                    placeholder="Ví dụ: 30"
                    min="1"
                  />
                </div>
                <div class="form-group">
                  <label for="service-description">Mô tả:</label>
                  <textarea
                    id="service-description"
                    name="service_description"
                    rows="3"
                    placeholder="Mô tả dịch vụ"
                  ></textarea>
                </div>
                <button type="submit" id="submit-btn" class="btn primary-btn">
                  <i class="fas fa-save"></i> Lưu Dịch vụ
                </button>
                <button
                  type="button"
                  class="btn secondary-btn"
                  id="cancel-add-service-form-btn"
                >
                  <i class="fas fa-times"></i> Làm mới
                </button>
              </form>
            </div>
          </div>

          <div class="service-list">
            <h2>Danh sách Dịch vụ</h2>
            <table>
              <thead>
                <tr>
                  <th>Mã Dịch vụ</th>
                  <th>Tên Dịch vụ</th>
                  <th>Giá</th>
                  <th>Thời lượng</th>
                  <th>Mô tả</th>
                  <th>Hành động</th>
                </tr>
              </thead>
              <tbody id="service-table-body">
                <tr>
                  <td colspan="6" style="text-align: center">
                    Đang tải dữ liệu...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <footer
      style="
        background-color: #1a1a1a;
        color: #fff;
        text-align: center;
        padding: 20px;
      "
    >
      <p>Barber Shop. All rights reserved.</p>
    </footer>

    <script src="../../js/js-client/script.js"></script>
    <script src="../../js/js-admin/admin-auth.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        loadServices();
        document
          .getElementById("show-add-service-form-btn")
          .addEventListener("click", function () {
            // Hiển thị form lên
            document.getElementById(
              "add-service-form-container",
            ).style.display = "block";

            // Làm sạch form phòng trường hợp trước đó vừa bấm Sửa
            document.getElementById("add-service-form").reset();
            document.getElementById("service-id").value = "";
            document.getElementById("form-title").innerText =
              "Thêm Dịch vụ Mới";
            document.getElementById("submit-btn").innerHTML =
              '<i class="fas fa-save"></i> Lưu Dịch vụ';
          });
        // Xử lý Form Thêm/Sửa
        document
          .getElementById("add-service-form")
          .addEventListener("submit", function (e) {
            e.preventDefault();
            const id = document.getElementById("service-id").value;
            const endpoint = id
              ? "../../../backend/update_service.php"
              : "../../../backend/add_service.php";

            fetch(endpoint, { method: "POST", body: new FormData(this) })
              .then((res) => res.json())
              .then((res) => {
                alert(res.message);
                if (res.status === "success") {
                  this.reset();
                  document.getElementById("service-id").value = "";
                  document.getElementById("form-title").innerText =
                    "Thêm Dịch vụ Mới";
                  document.getElementById("submit-btn").innerHTML =
                    '<i class="fas fa-save"></i> Lưu Dịch vụ';
                  loadServices();
                }
              });
          });

        // Nút làm mới form
        document
          .getElementById("cancel-add-service-form-btn")
          .addEventListener("click", function () {
            document.getElementById("add-service-form").reset();
            document.getElementById("service-id").value = "";
            document.getElementById("form-title").innerText =
              "Thêm Dịch vụ Mới";
            document.getElementById("submit-btn").innerHTML =
              '<i class="fas fa-save"></i> Lưu Dịch vụ';
          });
      });

      // Hàm load danh sách
      function loadServices() {
        fetch("../../../backend/api/get_services_admin.php")
          .then((res) => res.json())
          .then((res) => {
            const tbody = document.getElementById("service-table-body");
            tbody.innerHTML = "";
            if (res.status === "success" && res.data.length > 0) {
              res.data.forEach((s) => {
                let priceFormat = new Intl.NumberFormat("vi-VN").format(
                  s.price,
                );

                // Mã hóa an toàn 100% để gắn vào data-attribute
                let safeName = (s.service_name || "").replace(/"/g, "&quot;");
                let safeDesc = (s.description || "").replace(/"/g, "&quot;");

                tbody.innerHTML += `
                    <tr>
                        <td>DV${String(s.service_id).padStart(3, "0")}</td>
                        <td>${s.service_name}</td>
                        <td>${priceFormat} VNĐ</td>
                        <td>${s.duration || "0"} phút</td>
                        <td>${s.description || ""}</td>
                        <td>
                            <button class="btn edit-btn" 
                                data-id="${s.service_id}"
                                data-name="${safeName}"
                                data-price="${s.price}"
                                data-duration="${s.duration || ""}"
                                data-desc="${safeDesc}"
                                onclick="editService(this)" 
                                style="background-color: #FFC107; color: #000;">
                                <i class="fas fa-edit"></i> Sửa
                            </button>
                            <button class="btn delete-btn" onclick="deleteService(${s.service_id})"><i class="fas fa-trash"></i> Xóa</button>
                        </td>
                    </tr>`;
              });
            } else {
              tbody.innerHTML =
                "<tr><td colspan='6' style='text-align:center;'>Chưa có dịch vụ nào.</td></tr>";
            }
          });
      }

      // Hàm gọi khi bấm nút Sửa (Bắt data từ attribute của chính nút đó)
      function editService(btn) {
        document.getElementById("service-id").value =
          btn.getAttribute("data-id");
        document.getElementById("service-name").value =
          btn.getAttribute("data-name");
        document.getElementById("service-price").value =
          btn.getAttribute("data-price");
        document.getElementById("service-duration").value =
          btn.getAttribute("data-duration");
        document.getElementById("service-description").value =
          btn.getAttribute("data-desc");

        document.getElementById("form-title").innerText = "Cập nhật Dịch vụ";
        document.getElementById("submit-btn").innerHTML =
          '<i class="fas fa-check"></i> Cập nhật ngay';

        const formContainer = document.getElementById(
          "add-service-form-container",
        );
        formContainer.style.display = "block";
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function deleteService(id) {
        if (confirm("Bạn có chắc chắn muốn xóa dịch vụ này không?")) {
          fetch(`../../../backend/delete_service.php?id=${id}`)
            .then((res) => res.json())
            .then((res) => {
              alert(res.message);
              if (res.status === "success") loadServices();
            });
        }
      }
    </script>
  </body>
</html>
