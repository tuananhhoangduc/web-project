<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - Barber Shop</title>
    <link rel="stylesheet" href="../../css/css-client/style.css" />
    <link rel="stylesheet" href="../../css/css-client/form-styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-container">
        <div class="logo">
          <img src="../../image/logo.png" alt="Barber Shop Logo" />
        </div>
        <nav class="desktop-nav">
          <ul>
            <li><a href="index.php">Trang chủ</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <div class="form-container">
      <div class="back-to-home">
        <a href="index.php"><i class="fas fa-arrow-left"></i></a>
      </div>
      <h2>Chào mừng</h2>
      <p>Đăng nhập để tiếp tục trải nghiệm cùng chúng tôi</p>

      <form id="login-form" onsubmit="return processLoginAPI(event);">
        <div class="form-group">
          <span class="icon"><i class="fas fa-envelope"></i></span>
          <input
            type="text"
            name="username"
            placeholder="Email hoặc SĐT"
            required
          />
        </div>
        <div class="form-group">
          <span class="icon"><i class="fas fa-lock"></i></span>
          <input
            type="password"
            name="password"
            placeholder="Mật khẩu"
            required
          />
        </div>
        <button type="submit" class="btn-submit">Đăng nhập</button>
      </form>

      <div class="signup-link">
        Bạn chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
      </div>
    </div>

    <script>
      // HÀM XỬ LÝ ĐĂNG NHẬP API
      function processLoginAPI(event) {
        // 1. CHẶN ĐỨNG TRÌNH DUYỆT KHÔNG CHO NHẢY SANG TRANG PHP
        event.preventDefault();

        // 2. Lấy dữ liệu từ Form
        const formElement = document.getElementById("login-form");
        const formData = new FormData(formElement);

        // 3. Gửi Fetch API ngầm
        fetch("../../../backend/login_process.php", {
          method: "POST",
          body: formData,
        })
          .then((res) => res.json())
          .then((res) => {
            if (res.status === "success") {
              // Lưu dữ liệu vào trình duyệt
              localStorage.setItem("user_id", res.data.user_id);
              localStorage.setItem("full_name", res.data.full_name);
              localStorage.setItem("user_role", res.data.role);

              alert("Đăng nhập thành công!");

              // PHÂN LUỒNG QUYỀN TRUY CẬP
              const role = (res.data.role || "").toLowerCase().trim();
              if (role === "admin") {
                window.location.href = "../html-admin/admin-dashboard.html";
              } else if (role === "stylist") {
                window.location.href = "../html-barber/barber-dashboard.html"; // Thợ thì nhảy vào đây
              } else {
                window.location.href = "index.php"; // Khách thì vào đây
              }
            } else {
              alert(res.message || "Tài khoản hoặc mật khẩu không đúng!");
            }
          })
          .catch((err) => {
            console.error("Lỗi Fetch:", err);
            alert("Lỗi kết nối đến Server Backend!");
          });

        return false; // Đảm bảo form bị khóa 2 lớp
      }
    </script>
  </body>
</html>
