<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - Barber Shop</title>
    <link rel="stylesheet" href="../../css/css-client/style.css" />
    <link rel="stylesheet" href="../../css/css-client/form-styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-container">
        <div class="logo">
          <img src="../../image/logo.png" alt="Barber Shop Logo" />
        </div>
        <nav class="desktop-nav">
          <ul>
            <li><a href="index.html">Trang chủ</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <div class="form-container">
      <div class="back-to-home">
        <a href="index.html"><i class="fas fa-arrow-left"></i></a>
      </div>
      <h2>Chào mừng</h2>
      <p>Đăng nhập để tiếp tục trải nghiệm cùng chúng tôi</p>

      <form id="login-form" onsubmit="return processLoginAPI(event);">
        <div class="form-group">
          <span class="icon"><i class="fas fa-envelope"></i></span>
          <input
            type="text"
            name="username"
            placeholder="Email hoặc SĐT"
            required
          />
        </div>
        <div class="form-group">
          <span class="icon"><i class="fas fa-lock"></i></span>
          <input
            type="password"
            name="password"
            placeholder="Mật khẩu"
            required
          />
        </div>
        <button type="submit" class="btn-submit">Đăng nhập</button>
      </form>

      <div class="divider">hoặc</div>
      <div id="google-signin-button" class="google-signin-button"></div>
      <p id="google-signin-note" class="google-signin-note"></p>

      <div class="signup-link">
        Bạn chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
      </div>
    </div>

    <script>
      const GOOGLE_CLIENT_ID =
        "89603645494-8802h5d9olbt5l1lofgviauji36o1urh.apps.googleusercontent.com";

      function handleLoginSuccess(res) {
        if (res.status === "success") {
          localStorage.setItem("user_id", res.data.user_id);
          localStorage.setItem("full_name", res.data.full_name);
          localStorage.setItem("user_email", res.data.email || "");
          localStorage.setItem("user_role", res.data.role);
          localStorage.setItem(
            "auth_method",
            res.data.auth_method || "password",
          );

          alert("Đăng nhập thành công!");

          const role = (res.data.role || "").toLowerCase().trim();
          if (role === "admin") {
            window.location.href = "../html-admin/admin-dashboard.html";
          } else if (role === "stylist") {
            window.location.href = "../html-barber/barber-dashboard.html";
          } else {
            window.location.href = "index.html";
          }
        } else {
          alert(res.message || "Tài khoản hoặc mật khẩu không đúng!");
        }
      }

      // HÀM XỬ LÝ ĐĂNG NHẬP API
      function processLoginAPI(event) {
        // 1. CHẶN ĐỨNG TRÌNH DUYỆT KHÔNG CHO NHẢY SANG TRANG PHP
        event.preventDefault();

        // 2. Lấy dữ liệu từ Form
        const formElement = document.getElementById("login-form");
        const formData = new FormData(formElement);

        // 3. Gửi Fetch API ngầm
        fetch("../../../backend/login_process.php", {
          method: "POST",
          body: formData,
        })
          .then((res) => res.json())
          .then(handleLoginSuccess)
          .catch((err) => {
            console.error("Lỗi Fetch:", err);
            alert("Lỗi kết nối đến Server Backend!");
          });

        return false; // Đảm bảo form bị khóa 2 lớp
      }

      function handleGoogleCredentialResponse(response) {
        fetch("../../../backend/google_login_process.php", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            credential: response.credential,
          }),
        })
          .then((res) => res.json())
          .then(handleLoginSuccess)
          .catch((err) => {
            console.error("Lỗi Google Login:", err);
            alert("Không thể đăng nhập bằng Google lúc này!");
          });
      }

      function initGoogleSignIn() {
        const noteElement = document.getElementById("google-signin-note");

        if (!window.google || !google.accounts || !google.accounts.id) {
          if (noteElement) {
            noteElement.textContent =
              "Không tải được Google Sign-In. Kiểm tra kết nối mạng hoặc chặn trình duyệt.";
          }
          return;
        }

        if (
          GOOGLE_CLIENT_ID ===
          "YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
        ) {
          if (noteElement) {
            noteElement.textContent =
              "Bạn chưa cấu hình GOOGLE_CLIENT_ID nên nút Google chưa hiển thị.";
          }
          return;
        }

        if (noteElement) {
          noteElement.textContent = "";
        }

        google.accounts.id.initialize({
          client_id: GOOGLE_CLIENT_ID,
          callback: handleGoogleCredentialResponse,
        });

        const buttonContainer = document.getElementById("google-signin-button");
        if (buttonContainer) {
          google.accounts.id.renderButton(buttonContainer, {
            theme: "outline",
            size: "large",
            width: 360,
            text: "signin_with",
            shape: "rectangular",
          });
        }
      }

      window.addEventListener("load", initGoogleSignIn);
    </script>
  </body>
</html>
