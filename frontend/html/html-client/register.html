<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký tài khoản - Barber Shop</title>
    <link rel="stylesheet" href="../../css/css-client/style.css" />
    <link rel="stylesheet" href="../../css/css-client/form-styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-container">
        <div class="logo">
          <img src="../../image/logo.png" alt="Barber Shop Logo" />
        </div>
        <nav class="desktop-nav">
          <ul>
            <li><a href="index.php">Trang chủ</a></li>
            <li><a href="about.php">Về chúng tôi</a></li>
            <li><a href="services.php">Dịch vụ</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <div class="form-container">
      <div class="back-to-home">
        <a href="index.php"><i class="fas fa-arrow-left"></i></a>
      </div>
      <h2>Tạo Tài khoản</h2>

      <form id="register-form">
        <div class="form-group">
          <span class="icon"><i class="fas fa-user"></i></span>
          <input type="text" name="fullname" placeholder="Họ và tên" required />
        </div>
        <div class="form-group">
          <span class="icon"><i class="fas fa-envelope"></i></span>
          <input
            type="email"
            name="email"
            placeholder="Địa chỉ Email"
            required
          />
        </div>
        <div class="form-group">
          <span class="icon"><i class="fas fa-phone"></i></span>
          <input type="tel" name="phone" placeholder="Số điện thoại" required />
        </div>
        <div class="form-group">
          <span class="icon"><i class="fas fa-lock"></i></span>
          <input
            type="password"
            name="password"
            placeholder="Mật khẩu"
            required
          />
        </div>
        <button type="submit" class="btn-submit">Đăng ký</button>
      </form>

      <div class="login-link">
        Bạn đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
      </div>
    </div>

    <script>
      document
        .getElementById("register-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const data = {
            fullname: this.fullname.value,
            email: this.email.value,
            phone: this.phone.value,
            password: this.password.value,
          };

          fetch("../../../backend/register_process.php", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          })
            .then((res) => res.json())
            .then((result) => {
              alert(result.message);
              if (result.status === "success") {
                window.location.href = "login.html";
              }
            })
            .catch((error) => console.error("Lỗi API:", error));
        });
    </script>
  </body>
</html>
