<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lịch Sử Đặt Hẹn - Barber Shop</title>
    <link rel="stylesheet" href="../../css/css-client/style.css" />
    <link rel="stylesheet" href="../../css/css-client/history-styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <script>
      if (!localStorage.getItem("user_id")) {
        window.location.href = "login.html";
      }
    </script>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-container">
        <div class="logo">
          <img src="../../image/logo.png" alt="Barber Shop Logo" />
        </div>
        <nav class="desktop-nav">
          <ul>
            <li><a href="index.html">Trang chủ</a></li>
            <li><a href="about.html">Về chúng tôi</a></li>
            <li><a href="services.html">Dịch vụ</a></li>
          </ul>
        </nav>
        <div class="header-buttons desktop-buttons">
          <a href="appointment.html" class="btn primary-btn">Đặt lịch hẹn</a>
        </div>

        <div
          class="header-buttons desktop-buttons"
          id="auth-menu-container"
        ></div>
      </div>
    </header>

    <main class="page-main">
      <div class="container">
        <h1>Lịch Sử Đặt Hẹn</h1>
        <p class="customer-history-info">Danh sách các lịch hẹn của bạn:</p>

        <div class="appointment-history-list" id="history-list-container">
          <p style="text-align: center; color: #777">Đang tải dữ liệu...</p>
        </div>
      </div>
    </main>

    <footer
      style="
        background-color: #1a1a1a;
        color: #fff;
        text-align: center;
        padding: 20px;
      "
    >
      <p>Barber Shop. All rights reserved.</p>
    </footer>

    <script src="../../js/js-client/script.js"></script>
    <script src="../../js/js-client/auth-menu.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const userId = localStorage.getItem("user_id");
        const listContainer = document.getElementById("history-list-container");

        fetch(`../../../backend/api/get_history.php?user_id=${userId}`)
          .then((res) => res.json())
          .then((res) => {
            if (res.status === "success" && res.data.length > 0) {
              let html = "";
              res.data.forEach((app) => {
                let statusText = "Chờ xác nhận";
                let statusColor = "#f39c12";
                if (app.status === "confirmed") {
                  statusText = "Đã xác nhận";
                  statusColor = "#27ae60";
                }
                if (app.status === "completed") {
                  statusText = "Đã hoàn thành";
                  statusColor = "#2980b9";
                }
                if (app.status === "cancelled") {
                  statusText = "Đã hủy";
                  statusColor = "#c0392b";
                }

                let price = new Intl.NumberFormat("vi-VN").format(
                  app.total_price,
                );

                html += `
                        <div class="appointment-history-item" style="border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 8px;">
                            <div class="appointment-details-card">
                                <p><strong>Salon:</strong> ${app.branch_name}</p>
                                <p><strong>Dịch Vụ:</strong> ${app.service_name} (${price} VNĐ)</p>
                                <p><strong>Thợ Cắt:</strong> ${app.stylist_name || "Chưa sắp xếp"}</p>
                                <p><strong>Thời Gian:</strong> ${app.appointment_date}, ${app.appointment_time}</p>
                                <p><strong>Ghi Chú:</strong> ${app.notes || "Không có ghi chú"}</p>
                                <p class="appointment-status-card" style="color: ${statusColor}; font-weight: bold;">
                                    Trạng Thái: ${statusText}
                                </p>
                            </div>
                        `;

                // Chỉ hiển thị nút Hủy nếu lịch đang chờ xác nhận hoặc đã xác nhận (tuỳ logic của bạn, ở đây giữ nguyên pending)
                if (app.status === "pending") {
                  html += `
                            <div style="margin-top: 10px;">
                                <a href="javascript:void(0)" onclick="cancelAppointment(${app.appointment_id})" 
                                   class="btn btn-cancel-appointment" 
                                   style="background-color: #e74c3c; color: white; padding: 8px 15px; text-decoration: none; border-radius: 4px;">Hủy Lịch</a>
                            </div>`;
                }
                html += `</div>`;
              });
              listContainer.innerHTML = html;
            } else {
              listContainer.innerHTML =
                "<p style='text-align: center; color: #777;'>Bạn chưa có lịch hẹn nào.</p>";
            }
          })
          .catch((err) => {
            listContainer.innerHTML =
              "<p style='color: red;'>Lỗi tải dữ liệu lịch sử!</p>";
          });
      });

      // Đã sửa lại hàm cancelAppointment dùng fetch API để chạy ngầm
      function cancelAppointment(id) {
        if (confirm("Bạn có chắc chắn muốn hủy lịch hẹn này?")) {
          fetch(`../../../backend/cancel_appointment_client.php?id=${id}`)
            .then((response) => response.json())
            .then((data) => {
              alert(data.message); // Hiển thị thông báo (Đã hủy thành công)
              if (data.status === "success") {
                window.location.reload(); // Tự động load lại trang để cập nhật trạng thái
              }
            })
            .catch((error) => {
              console.error("Lỗi khi hủy lịch:", error);
              alert(
                "Có lỗi xảy ra khi kết nối đến máy chủ. Vui lòng thử lại sau.",
              );
            });
        }
      }
    </script>
  </body>
</html>
