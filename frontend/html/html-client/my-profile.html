<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thông Tin Của Tôi - Barber Shop</title>
    <link rel="stylesheet" href="../../css/css-client/style.css" />
    <link rel="stylesheet" href="../../css/css-client/my-profile-styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <script>
      // BẢO VỆ TRANG BẰNG JS API
      if (!localStorage.getItem("user_id")) {
        window.location.href = "login.html";
      }
    </script>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-container">
        <div class="logo">
          <img src="../../image/logo.png" alt="Barber Shop Logo" />
        </div>
        <nav class="desktop-nav">
          <ul>
            <li><a href="index.html">Trang chủ</a></li>
            <li><a href="about.html">Về chúng tôi</a></li>
            <li><a href="services.html">Dịch vụ</a></li>
          </ul>
        </nav>
        <div class="header-buttons desktop-buttons">
          <a href="appointment.html" class="btn primary-btn">Đặt lịch hẹn</a>
        </div>

        <div
          class="header-buttons desktop-buttons"
          id="auth-menu-container"
        ></div>
      </div>
    </header>

    <main class="page-main">
      <div class="container">
        <div class="profile-card">
          <h2>Thông Tin Cá Nhân Của Tôi</h2>
          <form id="profile-form">
            <div class="form-group">
              <label>Tên Khách hàng:</label>
              <input
                type="text"
                id="profile-name"
                readonly
                style="background-color: #f0f0f0"
                value="Đang tải..."
              />
            </div>
            <div class="form-group">
              <label>Số điện thoại:</label>
              <input
                type="tel"
                id="profile-phone"
                readonly
                style="background-color: #f0f0f0"
                value="Đang tải..."
              />
            </div>
            <div class="form-group">
              <label>Email:</label>
              <input
                type="email"
                id="profile-email"
                readonly
                style="background-color: #f0f0f0"
                value="Đang tải..."
              />
            </div>
            <div class="form-group">
              <label>Ngày đăng ký:</label>
              <input
                type="text"
                id="profile-date"
                readonly
                style="background-color: #f0f0f0"
                value="Đang tải..."
              />
            </div>
          </form>
        </div>
      </div>
    </main>

    <footer
      style="
        background-color: #1a1a1a;
        color: #fff;
        text-align: center;
        padding: 20px;
      "
    >
      <p>Barber Shop. All rights reserved.</p>
    </footer>
    <script src="../../js/js-client/script.js"></script>
    <script src="../../js/js-client/auth-menu.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const userId = localStorage.getItem("user_id");
        // GỌI API LẤY THÔNG TIN
        fetch(`../../../backend/api/get_profile.php?user_id=${userId}`)
          .then((res) => res.json())
          .then((res) => {
            if (res.status === "success") {
              document.getElementById("profile-name").value =
                res.data.full_name;
              document.getElementById("profile-phone").value = res.data.phone;
              document.getElementById("profile-email").value =
                res.data.email || "Chưa cập nhật";
              document.getElementById("profile-date").value =
                res.data.created_at;
            }
          })
          .catch((err) => console.error("Lỗi tải profile:", err));
      });
    </script>
  </body>
</html>
