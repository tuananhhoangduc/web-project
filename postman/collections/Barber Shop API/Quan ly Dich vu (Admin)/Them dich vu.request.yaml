$kind: http-request
name: 'Thêm dịch vụ'
method: POST
url: '{{base_url}}/add_service.php'
order: 1000
body:
  type: formdata
  content:
    - key: service_name
      type: text
      value: 'Cắt tóc Test'
    - key: service_price
      type: text
      value: '100000'
    - key: service_duration
      type: text
      value: '30'
    - key: service_description
      type: text
      value: 'Dịch vụ cắt tóc thử nghiệm'
tests: |-
  // Test 1: Status HTTP phải là 200
  pm.test("Status code is 200", function () {
      pm.response.to.have.status(200);
  });

  // Test 2: Response phải là JSON
  pm.test("Response is JSON", function () {
      pm.response.to.be.json;
  });

  // Test 3: Có trường 'status'
  pm.test("Response has 'status' field", function () {
      const json = pm.response.json();
      pm.expect(json).to.have.property('status');
  });

  // Test 4: Thêm thành công
  pm.test("Add service returns valid response", function () {
      const json = pm.response.json();
      pm.expect(json.status).to.be.oneOf(['success', 'error']);
      if (json.status === 'success') {
          pm.expect(json.message).to.include('thành công');
      }
  });