$kind: http-request
name: 'Thêm dịch vụ'
method: POST
url: '{{base_url}}/add_service.php'
order: 1000
body:
  type: formdata
  content:
    - key: service_name
      type: text
      value: ''
    - key: service_price
      type: text
      value: '100000'
    - key: service_duration
      type: text
      value: '30'
    - key: service_description
      type: text
      value: ''
