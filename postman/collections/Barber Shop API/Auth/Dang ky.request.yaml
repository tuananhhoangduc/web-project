$kind: http-request
name: 'Đăng ký'
method: POST
url: '{{base_url}}/register_process.php'
order: 1000
body:
  type: formdata
  content:
    - key: fullname
      type: text
      value: 'Nguyễn Văn Test'
    - key: email
      type: text
      value: 'test_register@gmail.com'
    - key: phone
      type: text
      value: '0900000001'
    - key: password
      type: text
      value: '123456'
tests: |-
  // Test 1: Status HTTP phải là 200
  pm.test("Status code is 200", function () {
      pm.response.to.have.status(200);
  });

  // Test 2: Response phải là JSON
  pm.test("Response is JSON", function () {
      pm.response.to.be.json;
  });

  // Test 3: Có trường 'status' trong response
  pm.test("Response has 'status' field", function () {
      const json = pm.response.json();
      pm.expect(json).to.have.property('status');
  });

  // Test 4: Đăng ký thành công hoặc email/SĐT đã tồn tại
  pm.test("Register success or duplicate account", function () {
      const json = pm.response.json();
      pm.expect(json.status).to.be.oneOf(['success', 'error']);
      if (json.status === 'success') {
          pm.expect(json.message).to.include('thành công');
      } else {
          pm.expect(json.message).to.be.a('string');
      }
  });