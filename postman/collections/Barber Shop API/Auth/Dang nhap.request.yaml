$kind: http-request
name: 'Đăng nhập'
method: POST
url: '{{base_url}}/login_process.php'
order: 2000
body:
  type: formdata
  content:
    - key: username
      type: text
      value: 'admin@barbershop.com'
      description: 'Email hoặc số điện thoại'
    - key: password
      type: text
      value: 'admin123'
tests: |-
  // Test 1: Status HTTP phải là 200
  pm.test("Status code is 200", function () {
      pm.response.to.have.status(200);
  });

  // Test 2: Response phải là JSON
  pm.test("Response is JSON", function () {
      pm.response.to.be.json;
  });

  // Test 3: Có trường 'status'
  pm.test("Response has 'status' field", function () {
      const json = pm.response.json();
      pm.expect(json).to.have.property('status');
  });

  // Test 4: Nếu thành công, data phải có user_id, full_name, role
  pm.test("Login success returns user data", function () {
      const json = pm.response.json();
      if (json.status === 'success') {
          pm.expect(json.data).to.have.property('user_id');
          pm.expect(json.data).to.have.property('full_name');
          pm.expect(json.data).to.have.property('role');
          // Lưu user_id vào collection variable để dùng cho các request sau
          pm.collectionVariables.set('user_id', json.data.user_id);
          pm.collectionVariables.set('user_role', json.data.role);
      }
  });