$kind: http-request
name: 'Cập nhật khách hàng'
method: POST
url: '{{base_url}}/update_customer.php'
order: 1000
body:
  type: formdata
  content:
    - key: customer_id
      type: text
      value: '1'
    - key: full_name
      type: text
      value: 'Nguyễn Văn Cập Nhật'
    - key: email
      type: text
      value: 'capnhat@gmail.com'
    - key: phone
      type: text
      value: '0912345678'
tests: |-
  // Test 1: Status HTTP phải là 200
  pm.test("Status code is 200", function () {
      pm.response.to.have.status(200);
  });

  // Test 2: Response phải là JSON
  pm.test("Response is JSON", function () {
      pm.response.to.be.json;
  });

  // Test 3: Có trường 'status'
  pm.test("Response has 'status' field", function () {
      const json = pm.response.json();
      pm.expect(json).to.have.property('status');
  });

  // Test 4: Cập nhật thành công hoặc lỗi hợp lệ
  pm.test("Update customer returns valid response", function () {
      const json = pm.response.json();
      pm.expect(json.status).to.be.oneOf(['success', 'error']);
  });