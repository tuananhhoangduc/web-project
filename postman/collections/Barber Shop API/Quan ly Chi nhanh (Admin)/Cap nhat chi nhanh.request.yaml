$kind: http-request
name: 'Cập nhật chi nhánh'
method: POST
url: '{{base_url}}/update_branch.php'
order: 2000
body:
  type: formdata
  content:
    - key: branch_id
      type: text
      value: '1'
    - key: branch_name
      type: text
      value: 'Chi nhánh Cập Nhật'
    - key: branch_address
      type: text
      value: '456 Đường Mới, Hà Nội'
    - key: branch_phone
      type: text
      value: '0247654321'
    - key: branch_email
      type: text
      value: 'capnhat@barbershop.com'
tests: |-
  // Test 1: Status HTTP phải là 200
  pm.test("Status code is 200", function () {
      pm.response.to.have.status(200);
  });

  // Test 2: Response phải là JSON
  pm.test("Response is JSON", function () {
      pm.response.to.be.json;
  });

  // Test 3: Có trường 'status'
  pm.test("Response has 'status' field", function () {
      const json = pm.response.json();
      pm.expect(json).to.have.property('status');
  });

  // Test 4: Cập nhật thành công hoặc lỗi hợp lệ
  pm.test("Update branch returns valid response", function () {
      const json = pm.response.json();
      pm.expect(json.status).to.be.oneOf(['success', 'error']);
  });