$kind: http-request
name: Lấy danh sách thợ theo chi nhánh
method: GET
url: '{{base_url}}/api/get_stylists.php'
examples: '.resources/Lay danh sach tho theo chi nhanh.resources/examples'
order: 1000
queryParams:
  - key: branch_id
    value: '1'
tests: |-
  // Test 1: Status HTTP phải là 200
  pm.test("Status code is 200", function () {
      pm.response.to.have.status(200);
  });

  // Test 2: Response phải là JSON
  pm.test("Response is JSON", function () {
      pm.response.to.be.json;
  });

  // Test 3: status = 'success'
  pm.test("Response status is success", function () {
      const json = pm.response.json();
      pm.expect(json.status).to.eql('success');
  });

  // Test 4: data là một mảng
  pm.test("Data is an array", function () {
      const json = pm.response.json();
      pm.expect(json.data).to.be.an('array');
  });

  // Test 5: Mỗi phần tử có stylist_id và full_name
  pm.test("Each stylist has stylist_id and full_name", function () {
      const json = pm.response.json();
      if (json.data.length > 0) {
          json.data.forEach(function(stylist) {
              pm.expect(stylist).to.have.property('stylist_id');
              pm.expect(stylist).to.have.property('full_name');
          });
      }
  });