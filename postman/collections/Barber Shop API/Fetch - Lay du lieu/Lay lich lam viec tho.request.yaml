$kind: http-request
name: 'Lấy lịch làm việc thợ'
method: GET
url: '{{base_url}}/api/get_barber_schedule.php'
order: 2000
queryParams:
  - key: user_id
    value: '1'
tests: |-
  // Test 1: Status HTTP phải là 200
  pm.test("Status code is 200", function () {
      pm.response.to.have.status(200);
  });

  // Test 2: Response phải là JSON
  pm.test("Response is JSON", function () {
      pm.response.to.be.json;
  });

  // Test 3: status = 'success'
  pm.test("Response status is success", function () {
      const json = pm.response.json();
      pm.expect(json.status).to.eql('success');
  });

  // Test 4: data có appointments và leave_history
  pm.test("Data has appointments and leave_history", function () {
      const json = pm.response.json();
      pm.expect(json.data).to.have.property('appointments');
      pm.expect(json.data).to.have.property('leave_history');
      pm.expect(json.data.appointments).to.be.an('array');
      pm.expect(json.data.leave_history).to.be.an('array');
  });
